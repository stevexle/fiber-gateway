<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Identity | Premium Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: #4f46e5;
            --bg-dark: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(236, 72, 153, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.5s ease;
            animation: globalFadeIn 0.5s forwards;
        }

        @keyframes globalFadeIn {
            to { opacity: 1; }
        }

        body.fade-out {
            opacity: 0 !important;
        }

        .container {
            width: 100%;
            max-width: 440px;
            padding: 20px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 48px;
        }

        .header h1 {
            font-size: 2.8rem;
            margin-bottom: 12px;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(to right, #818cf8, #c084fc, #818cf8);
            background-size: 200% auto;
            animation: gradientShimmer 4s linear infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes gradientShimmer {
            to { background-position: 200% center; }
        }

        .header p {
            color: #94a3b8;
            font-size: 1.15rem;
            font-weight: 400;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: 0.5s;
        }

        .card:hover::before {
            left: 100%;
        }

        h3 {
            margin: 0 0 32px 0;
            font-size: 1.6rem;
            font-weight: 600;
            text-align: center;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            padding: 16px 20px;
            border-radius: 16px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .remember-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 32px;
            font-size: 0.9rem;
            color: #94a3b8;
            cursor: pointer;
            user-select: none;
        }

        .remember-wrap input {
            width: 18px; height: 18px;
            accent-color: var(--primary);
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, #4f46e5, #6366f1);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.4);
        }

        button:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(79, 70, 229, 0.5);
        }

        button:active {
            transform: scale(0.98);
        }

        .loading-spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
            margin: 0 auto 24px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none !important;
        }

        #loading-text {
            color: #94a3b8;
            font-size: 1.1rem;
            text-align: center;
            font-weight: 300;
        }

        .status-msg {
            text-align: center;
            margin-top: 20px;
            font-size: 0.95rem;
            min-height: 1.5em;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Identity Proxy</h1>
            <p>Fiber Gateway • Secure Identity Protocol</p>
        </header>

        <main id="app-root">
            <div id="setup-card" class="card">
                <h3>Secure Sign In</h3>
                <div class="input-group">
                    <input type="text" id="username" placeholder="Username" value="admin">
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="Password" value="password">
                </div>
                <label class="remember-wrap">
                    <input type="checkbox" id="remember_me">
                    <span>Keep me logged in for 30 days</span>
                </label>
                <button id="btn-login">Unlock Secure Dashboard</button>
                <div id="login-status" class="status-msg"></div>
            </div>

            <div id="loading-card" class="card hidden">
                <div class="loading-spinner"></div>
                <div id="loading-text">Authenticating session...</div>
            </div>
        </main>
    </div>

    <script type="module" src="/main.ts"></script>
</body>
</html>
