<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Identity | Authorize Access</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: #4f46e5;
            --secondary: #a855f7;
            --bg-dark: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.1) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            opacity: 0;
            transition: opacity 0.5s ease;
            animation: globalFadeIn 0.5s forwards;
        }

        @keyframes globalFadeIn {
            to { opacity: 1; }
        }

        body.fade-out {
            opacity: 0 !important;
        }

        @keyframes backgroundFade { from { opacity: 0; } to { opacity: 1; } }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            perspective: 1000px;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(32px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 48px;
            box-shadow: 0 50px 100px -25px rgba(0, 0, 0, 0.6);
            text-align: center;
            animation: cardEntrance 0.8s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
        }

        @keyframes cardEntrance {
            from { transform: rotateX(-10deg) translateY(40px) scale(0.95); opacity: 0; }
            to { transform: rotateX(0deg) translateY(0) scale(1); opacity: 1; }
        }

        .app-icon {
            width: 88px;
            height: 88px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 26px;
            margin: 0 auto 28px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.22rem;
            color: white;
            font-weight: 700;
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.4);
            transform: rotate(-3deg);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover .app-icon { transform: rotate(0deg) scale(1.05); }

        h2 {
            margin: 0 0 12px 0;
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        p {
            color: #94a3b8;
            font-size: 1.05rem;
            line-height: 1.7;
            margin-bottom: 36px;
            font-weight: 300;
        }

        .permission-list {
            text-align: left;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 36px;
        }

        .permission-item {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 16px;
            font-size: 0.98rem;
            color: #e2e8f0;
        }

        .permission-item svg {
            flex-shrink: 0;
            filter: drop-shadow(0 0 4px rgba(52, 211, 153, 0.5));
        }

        .permission-item:last-child { margin-bottom: 0; }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        button {
            width: 100%;
            padding: 18px;
            border-radius: 18px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            border: none;
            font-family: inherit;
        }

        .btn-allow {
            background: linear-gradient(to right, #4f46e5, #6366f1, #4f46e5);
            background-size: 200% auto;
            color: white;
            box-shadow: 0 15px 25px -5px rgba(79, 70, 229, 0.4);
        }

        .btn-allow:hover {
            background-position: right center;
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 25px 35px -5px rgba(79, 70, 229, 0.5);
        }

        .btn-deny {
            background: transparent;
            color: #94a3b8;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .btn-deny:hover {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.08);
            border-color: rgba(239, 68, 68, 0.2);
        }

        .footer {
            margin-top: 36px;
            font-size: 0.9rem;
            color: #64748b;
            font-weight: 400;
        }
        
        #username-display { color: #f1f5f9; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container" id="app-root">
        <div class="card" id="auth-container">
            <div class="app-icon">ID</div>
            <h2 id="client-name">Grant Permission</h2>
            <p id="client-desc">
                This application is requesting secure access to your profile and resource ecosystem.
            </p>

            <div class="permission-list">
                <div class="permission-item">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="12" fill="#059669" fill-opacity="0.1"/>
                        <path d="M7 13L10 16L17 9" stroke="#34D399" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Read personal identity profile</span>
                </div>
                <div class="permission-item">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="12" fill="#059669" fill-opacity="0.1"/>
                        <path d="M7 13L10 16L17 9" stroke="#34D399" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Validate active session state</span>
                </div>
            </div>

            <div class="btn-group">
                <button id="btn-allow" class="btn-allow">Authorize & Continue</button>
                <button id="btn-deny" class="btn-deny">Deny Access</button>
            </div>

            <div class="footer">
                Authenticated as <span id="username-display">...</span>
            </div>
        </div>
    </div>

    <script type="module" src="/authorize.ts"></script>
</body>
</html>
