<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provisioning | Client Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-muted: #64748b;
            --required: #f43f5e;
        }

        body {
            margin: 0; background: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.05) 0px, transparent 40%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.05) 0px, transparent 40%);
            color: #f1f5f9; font-family: 'Outfit', sans-serif;
            display: flex; justify-content: center; min-height: 100vh; padding: 40px 20px;
        }

        .container { width: 100%; max-width: 900px; }
        .card { background: var(--glass); backdrop-filter: blur(24px); border: 1px solid var(--glass-border); border-radius: 32px; padding: 48px; box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.5); }

        h2 { margin: 0 0 8px 0; font-size: 2.2rem; font-weight: 700; letter-spacing: -0.01em; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { color: #94a3b8; margin-bottom: 40px; font-size: 0.95rem; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 32px; }
        .full-width { grid-column: span 2; }

        label { display: block; margin-bottom: 10px; font-weight: 600; font-size: 0.85rem; color: #cbd5e1; text-transform: uppercase; letter-spacing: 0.02em; }
        label .req { color: var(--required); margin-left: 4px; }
        label .opt { color: var(--text-muted); font-weight: 400; font-size: 0.75rem; margin-left: 8px; text-transform: none; }
        
        input, textarea { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); padding: 14px 18px; border-radius: 12px; color: white; font-size: 0.95rem; box-sizing: border-box; transition: 0.2s; font-family: 'Outfit', sans-serif; }
        input:focus { outline: none; border-color: var(--primary); background: rgba(255,255,255,0.06); box-shadow: 0 0 0 1px var(--primary); }

        .section-title { grid-column: span 2; margin: 24px 0 12px 0; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.2em; color: var(--primary); font-weight: 800; border-bottom: 1px solid var(--glass-border); padding-bottom: 8px; }

        .checkbox-card { background: rgba(99, 102, 241, 0.03); border: 1px solid rgba(99, 102, 241, 0.15); border-radius: 16px; padding: 24px; display: flex; align-items: center; gap: 16px; cursor: pointer; transition: 0.3s; }
        .checkbox-card:hover { border-color: var(--primary); background: rgba(99, 102, 241, 0.08); }

        button { width: 100%; background: linear-gradient(to right, #4f46e5, #6366f1); color: white; border: none; padding: 20px; border-radius: 16px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 20px; box-shadow: 0 20px 40px -10px rgba(79, 70, 229, 0.4); }
        button:hover { filter: brightness(1.1); transform: translateY(-3px); }

        .result-section { display: none; margin-top: 40px; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        pre { background: #000; padding: 24px; border-radius: 16px; color: #10b981; font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 0.85rem; border: 1px solid #10b98133; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>Client Provisioning</h2>
            <p class="subtitle">Securely onboard a new OAuth 2.0 / OIDC Client Entity.</p>
            
            <form id="register-form">
                <div class="form-grid">
                    <div class="section-title">Global Identity</div>
                    
                    <div class="form-group">
                        <label>Client Name <span class="req">*</span></label>
                        <input type="text" id="name" placeholder="Finance-App-NodeJS" required>
                    </div>

                    <div class="form-group">
                        <label>Realm Boundary <span class="opt">(Optional Namespace)</span></label>
                        <input type="text" id="realm_id" placeholder="production-v1">
                    </div>

                    <div class="form-group full-width">
                        <label>Allowed Callback URLs <span class="req">*</span> <span class="opt">(Comma separated redirect_uris)</span></label>
                        <input type="text" id="redirect_uris" placeholder="http://localhost:3000/callback" required>
                    </div>

                    <div class="section-title">Security Profile</div>

                    <div class="form-group full-width">
                        <label class="checkbox-card" for="is_confidential">
                            <input type="checkbox" id="is_confidential" style="width: 20px; height: 20px;">
                            <span><b>Confidential Flow</b> <span class="opt">(Enable Client Secret validation for Server-side apps)</span></span>
                        </label>
                    </div>

                    <div class="form-group">
                        <label>Allowed Web Origins <span class="opt">(CORS for SPAs)</span></label>
                        <input type="text" id="web_origins" placeholder="http://localhost:3000">
                    </div>

                    <div class="form-group">
                        <label>Post Logout Redirect URLs <span class="opt">(Optional)</span></label>
                        <input type="text" id="logout_uris" placeholder="http://localhost:3000/logout">
                    </div>

                    <div class="section-title">Application Metadata <span class="opt">(Optional)</span></div>

                    <div class="form-group">
                        <label>Icon URI</label>
                        <input type="url" id="icon_url" placeholder="https://myapp.com/favicon.ico">
                    </div>

                    <div class="form-group">
                        <label>Homepage URI</label>
                        <input type="url" id="home_page_url" placeholder="https://internal.myapp.com">
                    </div>

                    <div class="form-group full-width">
                        <label>Privacy Policy Link</label>
                        <input type="url" id="privacy_policy_url" placeholder="https://myapp.com/security/privacy">
                    </div>

                    <div class="form-group full-width">
                        <label>Entity Description</label>
                        <textarea id="description" rows="2" placeholder="Audit logs note: Internal banking dashboard..."></textarea>
                    </div>
                </div>

                <button type="submit">Provision Client Entity</button>
            </form>

            <div id="result" class="result-section">
                <h4 style="color: #10b981; margin: 0 0 16px 0; font-size: 1.1rem; letter-spacing: 0.05em;">✅ ENTITY SUCCESSFULLY PROVISIONED</h4>
                <pre id="client-data"></pre>
            </div>
            
            <p style="text-align: center; margin-top: 32px;">
                <a href="index.html" style="color: #64748b; text-decoration: none; font-size: 0.8rem; font-weight: 500;">← Return to Test Center</a>
            </p>
        </div>
    </div>
    <script type="module" src="/register.ts"></script>
</body>
</html>
